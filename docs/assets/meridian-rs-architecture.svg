<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Meridian RS architecture</title>
  <desc id="desc">Operator, Web UI, CLI, agent loop, screening, management, Meteora DLMM, Jupiter, Solana RPC, and local state flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#020617"/>
      <stop offset="0.55" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
    <style>
      .title { font: 700 38px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #e2e8f0; }
      .subtitle { font: 500 15px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #94a3b8; }
      .box-title { font: 700 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #f8fafc; }
      .box-sub { font: 500 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #cbd5e1; }
      .tiny { font: 500 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #94a3b8; }
      .flow { stroke: #38bdf8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); opacity: 0.9; }
      .soft { opacity: 0.68; }
    </style>
  </defs>

  <rect width="1200" height="620" rx="32" fill="url(#bg)"/>
  <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200" stroke="#1e293b" stroke-width="1" opacity="0.45"/>
  <path d="M120 0 V620 M240 0 V620 M360 0 V620 M480 0 V620 M600 0 V620 M720 0 V620 M840 0 V620 M960 0 V620 M1080 0 V620" stroke="#1e293b" stroke-width="1" opacity="0.45"/>

  <text x="60" y="70" class="title">Meridian RS</text>
  <text x="60" y="101" class="subtitle">Rust DLMM liquidity agent with a local Web UI, CLI/REPL controls, guarded execution, and readable operator logs.</text>
  <rect x="60" y="124" width="1080" height="4" rx="2" fill="url(#accent)" filter="url(#glow)"/>

  <!-- flows behind cards -->
  <path class="flow" d="M250 220 C315 220 315 220 380 220"/>
  <path class="flow" d="M250 340 C315 340 315 300 380 300"/>
  <path class="flow" d="M570 260 C635 260 635 210 700 210"/>
  <path class="flow" d="M570 260 C635 260 635 310 700 310"/>
  <path class="flow" d="M870 210 C930 210 930 210 990 210"/>
  <path class="flow" d="M870 310 C930 310 930 310 990 310"/>
  <path class="flow soft" d="M620 425 C520 455 400 455 300 425"/>

  <!-- operator inputs -->
  <rect x="70" y="165" width="180" height="110" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-width="2"/>
  <text x="95" y="205" class="box-title">Web UI</text>
  <text x="95" y="232" class="box-sub">HyperOS dashboard</text>
  <text x="95" y="253" class="tiny">status · controls · config</text>

  <rect x="70" y="285" width="180" height="110" rx="18" fill="#0f172a" stroke="#a78bfa" stroke-width="2"/>
  <text x="95" y="325" class="box-title">CLI / REPL</text>
  <text x="95" y="352" class="box-sub">operator commands</text>
  <text x="95" y="373" class="tiny">screen · manage · deploy</text>

  <!-- core -->
  <rect x="380" y="175" width="190" height="170" rx="20" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="410" y="215" class="box-title">Agent loop</text>
  <text x="410" y="243" class="box-sub">ReAct planner</text>
  <text x="410" y="267" class="tiny">LLM tools</text>
  <text x="410" y="288" class="tiny">dry-run guardrails</text>
  <text x="410" y="309" class="tiny">decision logging</text>

  <rect x="700" y="155" width="170" height="105" rx="18" fill="#0f172a" stroke="#fbbf24" stroke-width="2"/>
  <text x="728" y="197" class="box-title">Screening</text>
  <text x="728" y="225" class="box-sub">pool discovery</text>
  <text x="728" y="246" class="tiny">risk · signals · filters</text>

  <rect x="700" y="280" width="170" height="105" rx="18" fill="#0f172a" stroke="#fb7185" stroke-width="2"/>
  <text x="728" y="322" class="box-title">Management</text>
  <text x="728" y="350" class="box-sub">position lifecycle</text>
  <text x="728" y="371" class="tiny">claim · close · swap</text>

  <!-- external services -->
  <rect x="990" y="155" width="150" height="105" rx="18" fill="#111827" stroke="#38bdf8" stroke-width="2"/>
  <text x="1018" y="196" class="box-title">Meteora DLMM</text>
  <text x="1018" y="224" class="box-sub">native adapter</text>
  <text x="1018" y="245" class="tiny">deploy · claim · close</text>

  <rect x="990" y="280" width="150" height="105" rx="18" fill="#111827" stroke="#34d399" stroke-width="2"/>
  <text x="1018" y="322" class="box-title">Solana RPC</text>
  <text x="1018" y="350" class="box-sub">wallet + chain reads</text>
  <text x="1018" y="371" class="tiny">Helius compatible</text>

  <rect x="700" y="420" width="170" height="86" rx="18" fill="#0f172a" stroke="#fb923c" stroke-width="2"/>
  <text x="728" y="456" class="box-title">Jupiter</text>
  <text x="728" y="482" class="box-sub">swap routing</text>

  <rect x="300" y="405" width="320" height="125" rx="20" fill="#111827" stroke="#a78bfa" stroke-width="2"/>
  <text x="330" y="447" class="box-title">Local state</text>
  <text x="330" y="475" class="box-sub">~/.meridian/</text>
  <text x="330" y="498" class="tiny">positions · lessons · pool memory · signals</text>

  <text x="60" y="575" class="subtitle">Readable by default: pretty logs, JSON command envelopes, dry-run first, and production guardrails before live execution.</text>
</svg>
